<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <style>
      .teal { fill: #2DD4BF; opacity: 0.12; }
      .magenta { fill: #D946EF; opacity: 0.10; }
      .dot { fill: #2DD4BF; opacity: 0.1; }
      
      /* TikTok Path Drop Shadow Effect */
      .tiktok-base { fill: #0b0b0e; stroke: #2DD4BF; stroke-width: 4; opacity: 0.25; }
      .tiktok-magenta-shadow { fill: none; stroke: #D946EF; stroke-width: 4; opacity: 0.25; transform: translate(-4px, 4px); }
      
      .rocket-base { fill: #0b0b0e; stroke: #D946EF; stroke-width: 3; opacity: 0.25; }
      .rocket-teal-shadow { fill: none; stroke: #2DD4BF; stroke-width: 3; opacity: 0.25; transform: translate(-3px, 3px); }
    </style>
  </defs>

  <g transform="rotate(-45 400 400)">
    <!-- Diagonal Pills / Lines -->
    <rect x="-200" y="50" width="400" height="20" rx="10" class="teal" />
    <rect x="300" y="100" width="600" height="30" rx="15" class="magenta" />
    <rect x="-100" y="180" width="350" height="15" rx="7.5" class="teal" />
    <rect x="400" y="240" width="500" height="25" rx="12.5" class="teal" />
    <rect x="100" y="320" width="800" height="40" rx="20" class="magenta" />
    <rect x="-300" y="420" width="600" height="20" rx="10" class="teal" />
    <rect x="500" y="480" width="400" height="15" rx="7.5" class="magenta" />
    <rect x="200" y="560" width="700" height="30" rx="15" class="teal" />
    <rect x="-150" y="650" width="500" height="25" rx="12.5" class="magenta" />
    <rect x="350" y="730" width="600" height="20" rx="10" class="teal" />
    
    <!-- Dots -->
    <circle cx="250" cy="80" r="12" class="dot" />
    <circle cx="650" cy="200" r="8" class="dot" />
    <circle cx="150" cy="480" r="15" class="dot" />
    <circle cx="750" cy="620" r="10" class="dot" />
    
    <!-- TikTok Icons (simplified paths) -->
    <!-- Icon 1 -->
    <g transform="translate(100, 250) scale(1.5)">
      <path class="tiktok-magenta-shadow" d="M22,2A10,10,0,0,0,32,12V24.5a7.5,7.5,0,1,1-11-6.7v5.2A2.5,2.5,0,1,0,23,24.5V2H22Z" />
      <path class="tiktok-base" d="M22,2A10,10,0,0,0,32,12V24.5a7.5,7.5,0,1,1-11-6.7v5.2A2.5,2.5,0,1,0,23,24.5V2H22Z" />
    </g>
    <!-- Icon 2 -->
    <g transform="translate(600, 100) scale(2)">
      <path class="tiktok-magenta-shadow" d="M22,2A10,10,0,0,0,32,12V24.5a7.5,7.5,0,1,1-11-6.7v5.2A2.5,2.5,0,1,0,23,24.5V2H22Z" />
      <path class="tiktok-base" d="M22,2A10,10,0,0,0,32,12V24.5a7.5,7.5,0,1,1-11-6.7v5.2A2.5,2.5,0,1,0,23,24.5V2H22Z" />
    </g>
    <!-- Icon 3 -->
    <g transform="translate(300, 600) scale(1.2)">
      <path class="tiktok-magenta-shadow" d="M22,2A10,10,0,0,0,32,12V24.5a7.5,7.5,0,1,1-11-6.7v5.2A2.5,2.5,0,1,0,23,24.5V2H22Z" />
      <path class="tiktok-base" d="M22,2A10,10,0,0,0,32,12V24.5a7.5,7.5,0,1,1-11-6.7v5.2A2.5,2.5,0,1,0,23,24.5V2H22Z" />
    </g>

    <!-- Rocket Icons (simplified paths) -->
    <!-- Rocket 1 -->
    <g transform="translate(700, 450) scale(2) rotate(45)">
      <path class="rocket-teal-shadow" d="M12,2 C12,2 18,5 18,13 C18,21 12,24 12,24 C12,24 6,21 6,13 C6,5 12,2 12,2 Z M8,18 L4,22 L12,20 L20,22 L16,18 M12,14 A2,2 0 1,0 12,10 A2,2 0 1,0 12,14 Z" />
      <path class="rocket-base" d="M12,2 C12,2 18,5 18,13 C18,21 12,24 12,24 C12,24 6,21 6,13 C6,5 12,2 12,2 Z M8,18 L4,22 L12,20 L20,22 L16,18 M12,14 A2,2 0 1,0 12,10 A2,2 0 1,0 12,14 Z" />
    </g>
    <!-- Rocket 2 -->
    <g transform="translate(150, 750) scale(1.8) rotate(20)">
      <path class="rocket-teal-shadow" d="M12,2 C12,2 18,5 18,13 C18,21 12,24 12,24 C12,24 6,21 6,13 C6,5 12,2 12,2 Z M8,18 L4,22 L12,20 L20,22 L16,18 M12,14 A2,2 0 1,0 12,10 A2,2 0 1,0 12,14 Z" />
      <path class="rocket-base" d="M12,2 C12,2 18,5 18,13 C18,21 12,24 12,24 C12,24 6,21 6,13 C6,5 12,2 12,2 Z M8,18 L4,22 L12,20 L20,22 L16,18 M12,14 A2,2 0 1,0 12,10 A2,2 0 1,0 12,14 Z" />
    </g>
  </g>
</svg>
